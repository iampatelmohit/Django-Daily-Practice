{% extends 'todo/base.html' %}

{% block content %}
    <h2>
    {% if task %}
        Edit
      {% else %}
      Add
    {% endif %}
    Task
        </h2>
        <form method = "post"> 
            {% csrf_token %}
            <div class = "mb-3">
            <label class = "form-label">Title</label>
            <input type="text" name ="title" class = "form-control" value="{{task.title|default:''}}">
            </div>
            <div class = "mb-3">
                <label class ="form-label">Description</label>
                <textarea name="description" id="description" class="form-control" rows="3">{{task.description}}</textarea>
            </div>
            <button type = "submit" class = "btn btn-primary">Save</button>
            <a class="btn btn-secondary" href="{% url 'todo:task_list' %}"  >Cancel</a>
            

        </form>
{% endblock %}
